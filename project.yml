name: LatexSnap
options:
  bundleIdPrefix: com.latexsnap
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

targets:
  LatexSnap:
    type: application
    platform: macOS
    sources:
      - path: LatexSnap
        excludes:
          - "Info.plist"
          - "*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.latexsnap.app
        INFOPLIST_FILE: LatexSnap/Info.plist
        CODE_SIGN_ENTITLEMENTS: LatexSnap/LatexSnap.entitlements
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        PRODUCT_NAME: LatexSnap
